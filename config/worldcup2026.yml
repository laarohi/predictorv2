scoring:
  # Match prediction scoring
  match:
    correct_outcome: 5  # Points for predicting 1, X, or 2
    exact_score: 10     # Bonus points for exact score
    cap: 10             # Max hybrid bonus points

  # Team advancement scoring
  advancement:
    # Phase 1 (pre-tournament) points
    phase_1:
      group_advance: 10      # Team advances from group
      group_position: 5      # Correct group position (1st, 2nd, 3rd)
      round_of_32: 10
      round_of_16: 15
      quarter_final: 20
      semi_final: 40
      final: 60
      winner: 100

    # Phase 2 (after group stage) points - reduced
    phase_2:
      round_of_16: 10
      quarter_final: 15
      semi_final: 25
      final: 40
      winner: 70

  # Phase multipliers for calculating final scores
  phase_multipliers:
    phase_1: 1.0
    phase_2: 0.7

rules:
  # Prediction locking
  lock_minutes_before_kickoff: 5

  # Blind pool - users can't see others' predictions
  blind_pool: true
  reveal_after_lock: true

  # Deadlines
  phase_1_deadline_before_tournament_start: 24  # hours
  phase_2_deadline_after_group_stage: 24        # hours

  # Tiebreakers for leaderboard
  tiebreakers:
    - exact_scores
    - correct_outcomes
    - earliest_registration

display:
  date_format: "DD MMM YYYY"
  time_format: "HH:mm"
  timezone: "UTC"

  # Team display
  show_flags: true
  flag_size: 24

  # Colors
  theme: "dark"
  primary_color: "#3b82f6"
  accent_color: "#22c55e"
