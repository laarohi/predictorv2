# World Cup 2026 Tournament Configuration
# This file configures the tournament structure and scoring rules.

tournament:
  name: "FIFA World Cup 2026"
  year: 2026
  teams: 48
  groups: 12
  teams_per_group: 4

# Prediction locking rules
locking:
  # Minutes before kickoff to lock predictions
  match_lock_before_kickoff: 5
  # Whether to lock entire bracket at a deadline vs individual match times
  bracket_lock_mode: "deadline"  # or "per_match"

# Scoring configuration
scoring:
  # Scoring mode for match predictions:
  # - "fixed":       Flat points for correct outcome (no rarity bonus).
  # - "hybrid":      Legacy. Base points + integer-divide rarity bonus
  #                  min(cap, total_predictors // correct_predictors).
  # - "logarithmic": Default. Base points + Shannon-surprisal rarity bonus.
  #                  R = min(cap, round(alpha * log2(1 / (2f))))
  #                  where f = correct_predictors / total_predictors and
  #                  alpha = 10/log2(15) ≈ 2.5596 so f = 1/30 hits cap 10.
  #                  Gates at f >= 0.5 (consensus picks earn no premium).
  #
  # Published rarity bonus by % of predictors who picked the actual outcome
  # (independent of pool size — scale-invariant):
  #   R = 0   when f > 43.67%   (consensus zone)
  #   R = 1   when 33.31% < f ≤ 43.67%
  #   R = 2   when 25.41% < f ≤ 33.31%
  #   R = 3   when 19.38% < f ≤ 25.41%
  #   R = 4   when 14.78% < f ≤ 19.38%
  #   R = 5   when 11.28% < f ≤ 14.78%
  #   R = 6   when  8.60% < f ≤ 11.28%
  #   R = 7   when  6.56% < f ≤  8.60%
  #   R = 8   when  5.00% < f ≤  6.56%
  #   R = 9   when  3.82% < f ≤  5.00%
  #   R = 10  when f ≤ 3.82%    (capped)
  # See docs/scoring-system.md for derivation.
  mode: "logarithmic"

  match:
    # Points for correctly predicting match outcome (1-X-2)
    correct_outcome: 5
    # Bonus points for predicting exact score
    exact_score: 10
    # Maximum rarity bonus. Anchor: alpha is chosen so f = 1/30 hits this
    # cap, so a uniquely correct call out of ~30 predictors maxes out.
    rarity_cap: 10
    # Legacy alias (read as fallback for older configs).
    hybrid_cap: 10

  advancement:
    # Points for predicting team advances from group stage
    group_advance: 10
    # Bonus for predicting correct group position (1st vs 2nd)
    group_position: 5
    # Knockout round advancement points
    round_of_32: 10
    round_of_16: 15
    quarter_final: 20
    semi_final: 40
    final: 60
    winner: 100

  # Phase-specific multipliers
  # Phase 1: Pre-tournament predictions (full points)
  # Phase 2: Post-group stage predictions (reduced points)
  phase_multipliers:
    phase_1: 1.0
    phase_2: 0.7

# Bonus questions
# These are pre-tournament predictions that lock with Phase 1 and are scored
# when the admin enters the correct answer in /admin. Three categories.
#
# Each question has a stable `id` used as the foreign key in bonus_predictions
# and bonus_answers. Labels support {top_n} substitution so changing top_n
# below updates the wording everywhere automatically.
bonus:
  # Configurable: which FIFA rank cutoff defines "dark horse" / "flop". Users
  # see this number substituted into the question labels; auto-computation of
  # those questions reads `fifa_top_teams` below to decide which teams count
  # as "inside the top N".
  top_n: 10

  # Teams considered FIFA top-N at tournament start. Used by the auto-resolver
  # to decide "dark horse" (best progress among teams OUTSIDE this list) and
  # "bottlers" (earliest exit among teams INSIDE this list). Only teams that
  # are actually in the competition contribute — others are ignored.
  fifa_top_teams:
    - "Argentina"
    - "France"
    - "Spain"
    - "England"
    - "Brazil"
    - "Belgium"
    - "Portugal"
    - "Netherlands"
    - "Italy"
    - "Germany"

  # Point values per category. Flat within a category, so all 4 group-stage
  # questions are worth the same. Tweak here without code changes.
  points:
    group_stage: 15
    top_flop: 20
    awards: 20

  # Question definitions. `input_type` drives the wizard UI:
  #   - 'team'   → 48-team dropdown sourced from the groups: section above
  #   - 'player' → free-text input until the squads table ships, at which
  #                point answers get normalized against player_id lookups.
  questions:
    # ── Group stage ──────────────────────────────────────────────────
    - id: most_goals_scored_group
      category: group_stage
      label: "Goal Machine — team that scored the most goals in the group stage"
      input_type: team
    - id: least_goals_scored_group
      category: group_stage
      label: "Toothless Attack — team that scored the fewest goals in the group stage"
      input_type: team
    - id: most_goals_conceded_group
      category: group_stage
      label: "The Sieve — team that conceded the most goals in the group stage"
      input_type: team
    - id: least_goals_conceded_group
      category: group_stage
      label: "The Fortress — team that conceded the fewest goals in the group stage"
      input_type: team

    # ── Top / Flop (FIFA top_n cutoff) ───────────────────────────────
    - id: dark_horse
      category: top_flop
      label: "Dark Horse — team outside FIFA top {top_n} that progresses furthest"
      input_type: team
    - id: flop
      category: top_flop
      label: "Bottlers — team inside FIFA top {top_n} eliminated earliest"
      input_type: team

    # ── Awards (FIFA awards ceremony) ────────────────────────────────
    - id: best_player
      category: awards
      label: "Golden Ball — best player of the tournament"
      input_type: player
    - id: top_scorer
      category: awards
      label: "Golden Boot — top scorer of the tournament"
      input_type: player
    - id: best_young_player
      category: awards
      label: "Golden Boy — best young player of the tournament"
      input_type: player
    - id: golden_glove
      category: awards
      label: "Golden Glove — best goalkeeper of the tournament"
      input_type: player

# Group stage configuration
groups:
  A: ["United States", "Morocco", "Jamaica", "TBD"]
  B: ["France", "Denmark", "Poland", "TBD"]
  C: ["Brazil", "Nigeria", "Cameroon", "TBD"]
  D: ["Argentina", "Chile", "Peru", "TBD"]
  E: ["Germany", "Netherlands", "Belgium", "TBD"]
  F: ["Spain", "Portugal", "Italy", "TBD"]
  G: ["England", "Wales", "Scotland", "TBD"]
  H: ["Japan", "South Korea", "Australia", "TBD"]
  I: ["Mexico", "Colombia", "Ecuador", "TBD"]
  J: ["Uruguay", "Paraguay", "Venezuela", "TBD"]
  K: ["Canada", "Costa Rica", "Panama", "TBD"]
  L: ["Saudi Arabia", "Iran", "Qatar", "TBD"]
