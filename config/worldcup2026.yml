# World Cup 2026 Tournament Configuration
# 48 teams, 12 groups of 4, expanded knockout stage

tournament:
  name: "FIFA World Cup 2026"
  code: "WC2026"
  hosts:
    - United States
    - Canada
    - Mexico
  start_date: "2026-06-11"
  end_date: "2026-07-19"

format:
  total_teams: 48
  groups: 12
  teams_per_group: 4

  # Qualification from groups
  # Top 2 from each group (24) + best 8 third-place teams (32 total)
  group_qualifiers:
    automatic: 2  # Top 2 always qualify
    third_place: 8  # Best 8 third-place teams

  knockout_stages:
    - name: "Round of 32"
      code: "round_of_32"
      teams: 32
      matches: 16
    - name: "Round of 16"
      code: "round_of_16"
      teams: 16
      matches: 8
    - name: "Quarter-Finals"
      code: "quarter_final"
      teams: 8
      matches: 4
    - name: "Semi-Finals"
      code: "semi_final"
      teams: 4
      matches: 2
    - name: "Third Place Play-off"
      code: "third_place"
      teams: 2
      matches: 1
    - name: "Final"
      code: "final"
      teams: 2
      matches: 1

