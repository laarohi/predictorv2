<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/icon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="description" content="Football prediction competition for World Cup 2026" />
		<meta name="robots" content="noindex, nofollow" />

		<!-- PWA / iOS home-screen app: Share → Add to Home Screen launches
		     standalone (no Safari chrome) with the CxF crest icon. Status bar
		     themed navy to blend into the .pn-mast masthead (var(--ink)). -->
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<meta name="theme-color" content="#0e1d40" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="Predictaa" />
		<!-- Google Fonts: Panini theme — Archivo Black (display), Archivo (display2), IBM Plex Sans (body), IBM Plex Mono (mono) -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800;900&family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
		<title>CxF Predictaa</title>
		<style>
			@keyframes pn-splash-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.55; } }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
		<!-- Cold-load splash. With ssr=false the body is empty until the JS
		     bundle hydrates; the root layout removes #app-splash on mount, so
		     this only shows during the initial download/parse instead of a
		     blank white screen. Self-styled (the app's CSS isn't loaded yet). -->
		<div
			id="app-splash"
			aria-hidden="true"
			style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;background:#f1ebde;"
		>
			<div
				style="width:64px;height:64px;border-radius:50%;background:#c8281f;color:#f1ebde;display:flex;align-items:center;justify-content:center;font-family:'Archivo Black',system-ui,sans-serif;font-size:20px;letter-spacing:0.03em;box-shadow:5px 5px 0 #0e1d40;animation:pn-splash-pulse 1.2s ease-in-out infinite;"
			>
				CxF
			</div>
			<div
				style="font-family:'IBM Plex Mono',ui-monospace,monospace;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:#8a826f;"
			>
				Loading…
			</div>
		</div>
	</body>
</html>
