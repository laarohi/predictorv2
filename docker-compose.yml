services:
  db:
    image: postgres:16-alpine
    container_name: predictor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: predictor
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-predictor}
      POSTGRES_DB: predictor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictor-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://predictor:${DATABASE_PASSWORD:-predictor}@db:5432/predictor
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-super-secret-dev-key-change-in-prod}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:5173,http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/google/callback}
      - FOOTBALL_DATA_TOKEN=${FOOTBALL_DATA_TOKEN:-}
      - TOURNAMENT_CONFIG_PATH=/app/config/worldcup2026.yml
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/data:/app/data
      - ./backend/alembic:/app/alembic
      - ./config:/app/config
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictor-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  # Development-only frontend with hot reload.
  # container_name removed so this works in parallel with the main-repo
  # frontend-dev (which has the same hardcoded name in its own docker-compose).
  # Port shifted to 5174 to avoid a port clash with the main repo's :5173.
  # Joins predictorv2_default (declared external below) so vite's /api proxy
  # can reach the main-repo backend by hostname `backend`.
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174"
    profiles:
      - dev
    networks:
      - default
      - predictorv2_default

  # Nginx reverse proxy (production)
  nginx:
    image: nginx:alpine
    container_name: predictor-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    expose:
      - "80"
    depends_on:
      - backend
      - frontend
    profiles:
      - prod

  # Cloudflare Tunnel - replaces public port exposure
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: predictor-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - prod

volumes:
  postgres_data:

networks:
  # External reference to the main-repo Compose project's default network.
  # Lets parallel worktree dev containers reach the shared backend/db.
  predictorv2_default:
    external: true
