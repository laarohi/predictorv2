services:
  db:
    image: postgres:16-alpine
    container_name: predictor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: predictor
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-predictor}
      POSTGRES_DB: predictor
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predictor"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: predictor-backend
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://predictor:${DATABASE_PASSWORD:-predictor}@db:5432/predictor
      # Required — no fallback. A missing/blank value fails the container at
      # startup rather than silently booting with a forgeable committed key.
      # Generate one into .env:  openssl rand -hex 32
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env (openssl rand -hex 32)}
      - DEBUG=${DEBUG:-false}
      # Admin bootstrap — comma-separated emails auto-granted admin on account
      # creation/login. Without this a fresh deploy has NO admin at all
      # (is_admin can only be toggled by an existing admin). Set your email in
      # .env before first launch, or use scripts/make_admin.py afterwards.
      - ADMIN_EMAILS_STR=${ADMIN_EMAILS_STR:-}
      # Open self-registration. Leave true for launch; set false in .env once
      # the friend group is onboarded so outsiders can't join the live pool.
      - REGISTRATION_ENABLED=${REGISTRATION_ENABLED:-true}
      - CORS_ORIGINS_STR=${CORS_ORIGINS_STR:-http://localhost:5173,http://localhost:3000}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8000/api/auth/google/callback}
      - FOOTBALL_DATA_TOKEN=${FOOTBALL_DATA_TOKEN:-}
      - TOURNAMENT_CONFIG_PATH=/app/config/worldcup2026.yml
      # Resend (transactional email). RESEND_API_KEY blank disables sending.
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - EMAIL_FROM=${EMAIL_FROM:-The Predictor <predictor@laarohi.xyz>}
      # Comma-separated allowlist for batch sends. Blank = send to all.
      # Set during live-fire tests to avoid emailing seeded test users.
      - EMAIL_TO_ALLOWLIST=${EMAIL_TO_ALLOWLIST:-}
      # Public frontend URL — used as the base for links in outbound
      # emails (magic-link login, etc.). Override in production .env.
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost:5173}
      # Web Push (VAPID). Blank keys disable push (no-op, like a blank
      # RESEND_API_KEY). Generate into .env on the VPS: python -m scripts.gen_vapid
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:aarohiluke@gmail.com}
      # Daily Drop morning broadcast (local hour:minute + timezone for the send).
      - DAILY_DROP_HOUR=${DAILY_DROP_HOUR:-8}
      - DAILY_DROP_MINUTE=${DAILY_DROP_MINUTE:-30}
      - DAILY_DROP_TZ=${DAILY_DROP_TZ:-Europe/Malta}
      # Phase C roast: the backend POSTs the day's prompt to the roaster sidecar
      # (which holds the subscription token + runs the Claude CLI). Unreachable —
      # e.g. prod, where the dev-only sidecar isn't running — → stand-in roast.
      - ROASTER_URL=${ROASTER_URL:-http://roaster:8787}
    volumes:
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
      - ./backend/tests:/app/tests
      - ./backend/data:/app/data
      - ./backend/alembic:/app/alembic
      - ./config:/app/config
      # Read-only mounts for golden-source assets that the backend tests
      # locate via parent-walk from /app/tests (see _find_file in
      # test_third_place_mapping.py): the Wikipedia HTML snapshot used to
      # validate the R32 mapping, and the canonical thirdPlaceMapping.json.
      - ./docs:/app/docs:ro
      - ./frontend/src/lib/config:/app/frontend/src/lib/config:ro
      # Cross-language golden fixtures: the standings parity test
      # (test_standings_parity.py) and its frontend Vitest twin consume the
      # same JSON so the two tiebreaker implementations can't silently drift.
      - ./shared:/app/shared:ro
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Roaster sidecar: Node + the Claude Code CLI, run headless on the user's
  # subscription to write the Back Page roast. The backend reaches it at
  # http://roaster:8787 over the compose network — no host port.
  roaster:
    build:
      context: ./roaster
      dockerfile: Dockerfile
    container_name: predictor-roaster
    restart: unless-stopped
    environment:
      # The subscription token lives ONLY here. ANTHROPIC_API_KEY is deliberately
      # not passed, so the OAuth token wins auth precedence inside the CLI.
      # OPTIONAL on purpose: a missing token must never fail `compose up` (that
      # would take the whole stack down). Tokenless → claude -p fails → the
      # backend falls back to the deterministic placeholder roast. After setting
      # the token in prod .env, restart just this service to activate roasts.
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      # Optional model override (e.g. claude-haiku-4-5); blank = account default.
      - ROAST_MODEL=${ROAST_MODEL:-}
      # How long the sidecar waits on `claude -p` before killing it. A real
      # roast generates in ~75-80s; the old 90s default left no slack for a slow
      # API morning (one timeout → the whole drop fell back to the placeholder),
      # so the default is 180s. Backend httpx (190s) sits just above this.
      - ROAST_TIMEOUT_MS=${ROAST_TIMEOUT_MS:-180000}
    # Runs in local dev (--profile dev) and prod (--profile prod); never in a
    # bare `docker compose up` without a profile.
    profiles:
      - dev
      - prod

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: predictor-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  # Development-only frontend with hot reload.
  # container_name intentionally omitted so Compose auto-names per project
  # (e.g. `predictorv2-frontend-dev-1` for the main repo, `redesign-frontend-
  # dev-1` for a parallel worktree). A parallel worktree dev container needs
  # to override the host port locally (e.g. "5174:5174" + --port 5174) and
  # join the existing predictorv2_default network to reach the shared
  # backend; see docs/superpowers/panini-redesign-decisions.md for the
  # exact recipe.
  frontend-dev:
    image: node:20-alpine
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      # Cross-language golden fixtures for the standings parity test
      # (standings.parity.test.ts locates it via parent-walk). Mirrors the
      # backend's ./shared mount so both Vitest and pytest read the same file.
      - ./shared:/app/shared:ro
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev

  # Nginx reverse proxy (production)
  nginx:
    image: nginx:alpine
    container_name: predictor-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    expose:
      - "80"
    depends_on:
      - backend
      - frontend
    profiles:
      - prod

  # Cloudflare Tunnel - replaces public port exposure
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: predictor-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - nginx
    profiles:
      - prod

volumes:
  postgres_data:
